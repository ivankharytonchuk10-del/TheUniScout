# Render blueprint — deploys the UniScout backend as a free web service.
# After deploy, set the secret env vars in the Render dashboard (marked sync:false),
# then add a free daily trigger (see server/DEPLOY-DIGEST.md).
services:
  - type: web
    name: uniscout
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 4242
      - key: DIGEST_HOUR
        value: 8
      # ── secrets: set these in the Render dashboard ──
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DIGEST_CRON_TOKEN
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
